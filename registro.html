<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de cuenta</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f1f5f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .register-card {
            background: white;
            border-radius: 14px;
            box-shadow: 0 10px 25px rgba(15, 23, 42, 0.12);
            padding: 32px;
            width: 100%;
            max-width: 500px;
        }

        .register-card h1 {
            margin: 0 0 20px;
            font-size: 26px;
            color: #111827;
            text-align: center;
        }

        .fila {
            display: flex;
            gap: 15px;
        }

        .campo {
            flex: 1;
        }

        .register-card label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            color: #374151;
        }

        .register-card input {
            width: 100%;
            padding: 10px;
            margin-bottom: 16px;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            font-size: 14px;
            box-sizing: border-box;
        }

        .register-card button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 6px;
            background-color: #2563eb;
            color: white;
            font-size: 16px;
            cursor: pointer;
        }

        .register-card button:hover {
            background-color: #1d4ed8;
        }

        .card-footer {
            margin-top: 20px;
            text-align: center;
            font-size: 14px;
            color: #6b7280;
        }

        .card-footer a {
            color: #2563eb;
            text-decoration: none;
            font-weight: 600;
        }

        .card-footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>

    <main class="register-card">

        <h1>Crear cuenta</h1>

        <form action="#" method="post">

            <div class="fila">

                <div class="campo">
                    <label for="nombre">Nombre</label>
                    <input type="text" id="nombre" name="nombre" placeholder="Ingresa tu nombre" required>
                </div>

                <div class="campo">
                    <label for="apellidos">Apellidos</label>
                    <input type="text" id="apellidos" name="apellidos" placeholder="Ingresa tus apellidos" required>
                </div>

            </div>

            <label for="correo">Correo electrónico</label>
            <input type="email" id="correo" name="correo" placeholder="Ingresa tu correo" required>

            <label for="usuario">Nombre de usuario</label>
            <input type="text" id="usuario" name="usuario" placeholder="Crea un usuario" required>

            <label for="contrasena">Contraseña</label>
            <input type="password" id="contrasena" name="contrasena" placeholder="Crea una contraseña" required>

            <label for="confirmar">Confirmar contraseña</label>
            <input type="password" id="confirmar" name="confirmar" placeholder="Repite la contraseña" required>

            <button type="submit">Registrarse</button>

        </form>

        <div class="card-footer">
            <p>Completa tus datos para crear una cuenta.</p>
            ¿Ya tienes cuenta? <a href="iniciosesion.html">Inicia sesión</a>
        </div>

    </main>

</body>

</html>
