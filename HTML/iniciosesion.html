<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inicio de sesión</title>
    <link rel="stylesheet" href="../CSS/style.css">
    <link rel="stylesheet" href="../CSS/auth.css">
</head>
<body>
     <div id="header-placeholder"></div>

    <script>
        fetch('header.html')
            .then(response => {
                if (!response.ok) throw new Error('HTTP ' + response.status);
                return response.text();
            })
            .then(data => {
                document.getElementById('header-placeholder').innerHTML = data;
            })
            .catch(e => {
                console.error('Error cargando header:', e);
                document.getElementById('header-placeholder').innerHTML = '<!-- header no cargado -->';
            });
    </script>
    <br>
    <main class="login-container">
        <h1 align="center">Iniciar sesión</h1>
        <form action="#" method="post">
            <label for="usuario">Usuario o correo</label>
            <input type="text" id="usuario" name="usuario" placeholder="Ingresa tu usuario o correo" required>

            <label for="contrasena">Contraseña</label>
            <input type="password" id="contrasena" name="contrasena" placeholder="Ingresa tu contraseña" required>

            <button type="submit">Entrar</button>
        </form>
        <div class="login-footer">
            <p class="description" align="center">Accede a tu cuenta introduciendo tu usuario y contraseña.</p>
            ¿No tienes cuenta? <a href="registro.html">Regístrate</a>
        </div>
    </main>
    <br>
    <div id="footer-placeholder"></div>

    <script>
        fetch('footer.html')
            .then(response => {
                if (!response.ok) throw new Error('HTTP ' + response.status);
                return response.text();
            })
            .then(data => {
                document.getElementById('footer-placeholder').innerHTML = data;
            })
            .catch(e => {
                console.error('Error cargando footer:', e);
                document.getElementById('footer-placeholder').innerHTML = '<!-- footer no cargado -->';
            });
    </script>
     <script src="../JS/buscador.js"></script>

</body>
</html>
