<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inicio de sesión</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f1f5f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .login-card {
            background: white;
            border-radius: 14px;
            box-shadow: 0 10px 25px rgba(15, 23, 42, 0.12);
            padding: 32px;
            width: 100%;
            max-width: 400px;
        }
        .login-card h1 {
            margin: 0 0 8px;
            font-size: 26px;
            color: #111827;
        }
        .login-card p.description {
            margin: 0 0 24px;
            color: #6b7280;
            line-height: 1.6;
        }
        .login-card label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            color: #374151;
        }
        .login-card input {
            width: 100%;
            padding: 10px;
            margin-bottom: 16px;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            font-size: 14px;
        }
        .login-card button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 6px;
            background-color: #2563eb;
            color: white;
            font-size: 16px;
            cursor: pointer;
        }
        .login-card button:hover {
            background-color: #1d4ed8;
        }
        .card-footer {
            margin-top: 20px;
            text-align: center;
            font-size: 14px;
            color: #6b7280;
        }
        .card-footer a {
            color: #2563eb;
            text-decoration: none;
            font-weight: 600;
        }
        .card-footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <main class="login-card">
        <h1 align="center">Iniciar sesión</h1>
        <form action="#" method="post">
            <label for="usuario">Usuario o correo</label>
            <input type="text" id="usuario" name="usuario" placeholder="Ingresa tu usuario o correo" required>

            <label for="contrasena">Contraseña</label>
            <input type="password" id="contrasena" name="contrasena" placeholder="Ingresa tu contraseña" required>

            <button type="submit">Entrar</button>
        </form>
        <div class="card-footer">
            <p class="description" align="center">Accede a tu cuenta introduciendo tu usuario y contraseña.</p>
            ¿No tienes cuenta? <a href="registro.html">Regístrate</a>
        </div>
    </main>
</body>
</html>
